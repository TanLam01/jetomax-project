basePath: /api/v1
definitions:
  dto.AddMembersRequest:
    properties:
      user_ids:
        items:
          type: string
        type: array
    required:
    - user_ids
    type: object
  dto.AddMembersResponse:
    properties:
      added_count:
        type: integer
      added_user_ids:
        items:
          type: string
        type: array
    type: object
  dto.ConversationListResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/dto.ConversationResponse'
        type: array
    type: object
  dto.ConversationResponse:
    properties:
      avatar_key:
        type: string
      created_at:
        type: string
      id:
        type: string
      last_message:
        $ref: '#/definitions/dto.MessagePreviewResponse'
      name:
        type: string
      role:
        type: string
      type:
        type: string
      unread_count:
        type: integer
      updated_at:
        type: string
    type: object
  dto.CreateDirectRequest:
    properties:
      user_id:
        type: string
    required:
    - user_id
    type: object
  dto.CreateGroupRequest:
    properties:
      avatar_key:
        type: string
      member_ids:
        items:
          type: string
        type: array
      name:
        type: string
    required:
    - member_ids
    - name
    type: object
  dto.ErrorDetail:
    properties:
      code:
        type: string
      message:
        type: string
    type: object
  dto.ErrorResponse:
    properties:
      error:
        $ref: '#/definitions/dto.ErrorDetail'
    type: object
  dto.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  dto.MessagePageResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/dto.MessageResponse'
        type: array
      has_more:
        type: boolean
      next_cursor:
        type: string
    type: object
  dto.MessagePreviewResponse:
    properties:
      created_at:
        type: string
      id:
        type: string
      sender_id:
        type: string
      text:
        type: string
      type:
        type: string
    type: object
  dto.MessageResponse:
    properties:
      client_message_id:
        type: string
      conversation_id:
        type: string
      created_at:
        type: string
      id:
        type: string
      sender_id:
        type: string
      text:
        type: string
      type:
        type: string
    type: object
  dto.RefreshTokenRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  dto.RegisterRequest:
    properties:
      display_name:
        type: string
      email:
        type: string
      password:
        type: string
    required:
    - display_name
    - email
    - password
    type: object
  dto.SessionResponse:
    properties:
      access_expires_at:
        type: string
      access_token:
        type: string
      refresh_expires_at:
        type: string
      refresh_token:
        type: string
      token_type:
        type: string
      user:
        $ref: '#/definitions/dto.UserResponse'
    type: object
  dto.UserListResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/dto.UserResponse'
        type: array
    type: object
  dto.UserResponse:
    properties:
      avatar_key:
        type: string
      display_name:
        type: string
      email:
        type: string
      id:
        type: string
    type: object
info:
  contact: {}
  description: REST API for the realtime chat application.
  title: Realtime Chat API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: Login payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.SessionResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Login
      tags:
      - auth
  /auth/logout:
    post:
      consumes:
      - application/json
      description: Revokes the supplied refresh token.
      parameters:
      - description: Refresh token
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.RefreshTokenRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Logout
      tags:
      - auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Revokes the supplied refresh token and issues a new session.
      parameters:
      - description: Refresh token
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.RefreshTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.SessionResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Rotate a refresh token
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Creates an account. The password is stored only as a one-way bcrypt
        hash.
      parameters:
      - description: Registration payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.SessionResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Register a user
      tags:
      - auth
  /conversations:
    get:
      description: Returns up to 50 conversations ordered by latest activity with
        last message and unread count.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ConversationListResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List conversations for the authenticated member
      tags:
      - conversations
  /conversations/{id}/members:
    post:
      consumes:
      - application/json
      description: Only the group owner or an admin can add users. Existing members
        are ignored.
      parameters:
      - description: Conversation UUID
        in: path
        name: id
        required: true
        type: string
      - description: Users to add
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.AddMembersRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.AddMembersResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Add members to a group conversation
      tags:
      - conversations
  /conversations/{id}/messages:
    get:
      description: Returns messages newest-first using cursor pagination. Only conversation
        members may access this endpoint.
      parameters:
      - description: Conversation UUID
        in: path
        name: id
        required: true
        type: string
      - description: Opaque cursor returned by the previous response
        in: query
        name: cursor
        type: string
      - description: Page size (default 20, maximum 100)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.MessagePageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get conversation message history
      tags:
      - messages
  /conversations/direct:
    post:
      consumes:
      - application/json
      description: Returns 201 when created and 200 when the same user pair already
        has a direct conversation.
      parameters:
      - description: Target user
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreateDirectRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ConversationResponse'
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.ConversationResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create or get a direct conversation
      tags:
      - conversations
  /conversations/groups:
    post:
      consumes:
      - application/json
      description: The authenticated creator becomes owner; invited users become members.
      parameters:
      - description: Group details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreateGroupRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.ConversationResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create a group conversation
      tags:
      - conversations
  /users:
    get:
      parameters:
      - description: Search query (2-100 characters)
        in: query
        name: query
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.UserListResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Search users by display name or email
      tags:
      - users
  /users/me:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.UserResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get the authenticated user profile
      tags:
      - users
schemes:
- http
- https
securityDefinitions:
  BearerAuth:
    description: 'Enter: Bearer {access_token}'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
